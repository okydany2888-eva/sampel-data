<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Consumable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; padding: 20px; }
        .header { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .btn-tambah { background: #f59e0b; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; }
        .table-wrapper { background: white; border-radius: 20px; overflow-x: auto; padding: 0 0 12px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .action-icons i { margin: 0 5px; cursor: pointer; }
        .fa-edit { color: #3b82f6; }
        .fa-trash-alt { color: #ef4444; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; }
        .btn-simpan { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; }
        .search-box { background: #f1f5f9; padding: 8px 16px; border-radius: 40px; margin-bottom: 20px; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; }
    </style>
</head>
<body>
<div class="header">
    <h2><i class="fas fa-clipboard-list"></i> Stock Consumable</h2>
    <button class="btn-tambah" onclick="openModal()"><i class="fas fa-plus"></i> Barang Keluar</button>
</div>
<div class="search-box"><i class="fas fa-search"></i> <input type="text" id="searchInput" placeholder="Cari..." onkeyup="renderTable()"></div>
<div class="table-wrapper">
    <table><thead><tr><th>Tgl Keluar</th><th>Brand</th><th>Barang</th><th>Jumlah</th><th>Satuan</th><th>PIC</th><th>Aksi</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Barang Keluar</h3>
        <form onsubmit="saveData(event)">
            <input type="hidden" id="editId">
            <div class="form-group"><label>Tanggal</label><input type="date" id="tanggalKeluar" required></div>
            <div class="form-group"><label>Brand</label><input type="text" id="brand" required></div>
            <div class="form-group"><label>Nama Barang</label><input type="text" id="barangKeluar" required></div>
            <div class="form-group"><label>Jumlah</label><input type="number" id="jumlahKeluar" min="1" required></div>
            <div class="form-group"><label>Satuan</label><input type="text" id="satuan"></div>
            <div class="form-group"><label>PIC</label><input type="text" id="pic"></div>
            <button type="submit" class="btn-simpan">Simpan</button>
            <button type="button" onclick="closeModal()" style="margin-left: 10px;">Batal</button>
        </form>
    </div>
</div>

<script>
    let dataKeluar = [];
    const STORAGE_KEY = 'inv_keluar_final_v2';
    
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) dataKeluar = JSON.parse(saved);
        else dataKeluar = [];
        renderTable();
    }
    function saveDataToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(dataKeluar)); }
    
    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filtered = dataKeluar.filter(k => (k.brand||'').toLowerCase().includes(search) || (k.barangKeluar||'').toLowerCase().includes(search));
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = filtered.map(k => `
            <tr>
                <td>${k.tanggalKeluar}</td>
                <td><strong>${escapeHtml(k.brand)}</strong></td>
                <td>${escapeHtml(k.barangKeluar)}</td>
                <td>${k.jumlahKeluar}</td>
                <td>${escapeHtml(k.satuan || '-')}</td>
                <td>${escapeHtml(k.pic || '-')}</td>
                <td class="action-icons"><i class="fas fa-edit" onclick="editData(${k.id})"></i><i class="fas fa-trash-alt" onclick="deleteData(${k.id})"></i></td>
            </tr>
        `).join('');
    }
    
    let editingId = null;
    function openModal() { editingId = null; document.getElementById('editId').value = ''; document.getElementById('modal').classList.add('show'); document.getElementById('tanggalKeluar').value = new Date().toISOString().slice(0,10); }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    
    function editData(id) {
        const item = dataKeluar.find(k => k.id === id);
        if (item) {
            editingId = id;
            document.getElementById('editId').value = id;
            document.getElementById('tanggalKeluar').value = item.tanggalKeluar;
            document.getElementById('brand').value = item.brand;
            document.getElementById('barangKeluar').value = item.barangKeluar;
            document.getElementById('jumlahKeluar').value = item.jumlahKeluar;
            document.getElementById('satuan').value = item.satuan || '';
            document.getElementById('pic').value = item.pic || '';
            document.getElementById('modal').classList.add('show');
        }
    }
    
    function deleteData(id) { if(confirm('Hapus?')) { dataKeluar = dataKeluar.filter(k => k.id !== id); saveDataToStorage(); renderTable(); } }
    
    function saveData(e) {
        e.preventDefault();
        const newId = editingId || (dataKeluar.length ? Math.max(...dataKeluar.map(k=>k.id)) + 1 : 1);
        const newData = {
            id: newId,
            tanggalKeluar: document.getElementById('tanggalKeluar').value,
            brand: document.getElementById('brand').value,
            barangKeluar: document.getElementById('barangKeluar').value,
            jumlahKeluar: parseInt(document.getElementById('jumlahKeluar').value),
            satuan: document.getElementById('satuan').value,
            pic: document.getElementById('pic').value
        };
        if (editingId) dataKeluar = dataKeluar.map(k => k.id === editingId ? newData : k);
        else dataKeluar.push(newData);
        saveDataToStorage(); renderTable(); closeModal();
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    
    loadData();
    window.openModal = openModal; window.closeModal = closeModal; window.editData = editData; window.deleteData = deleteData; window.renderTable = renderTable; window.saveData = saveData;
</script>
</body>
</html>
